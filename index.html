<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mimi ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #ff9a9e, #fad0c4);
  overflow: hidden;
  text-align: center;
}

h1 {
  margin-top: 60px;
  color: white;
  font-size: 3rem;
  text-shadow: 0 0 15px rgba(255,255,255,0.8);
  transition: opacity 1s ease;
}

img {
  width: 220px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 0 25px rgba(255, 105, 180, 0.7);
  transition: opacity 1s ease;
}

button {
  padding: 15px 30px;
  margin: 20px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s, opacity 1s ease;
}

#yesBtn {
  background-color: #ff4d6d;
  color: white;
  box-shadow: 0 0 15px #ff4d6d;
}

#noBtn {
  background-color: white;
  color: #ff4d6d;
  position: absolute;
}

button:hover {
  transform: scale(1.15);
}

#message {
  display: none;
  color: white;
  font-size: 2rem;
  margin-top: 40px;
}

/* NEW TEXT */
#extraText {
  display: none;
  color: white;
  font-size: 2.2rem;
  margin-top: 20px;
  font-weight: bold;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* VIDEO CONTAINER */
#videoContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
  opacity: 0;
  transition: opacity 1s ease;
}

/* INSTAGRAM RATIO (9:16) */
#videoContainer video {
  height: 90%;
  aspect-ratio: 9/16;
  object-fit: cover;
  border-radius: 20px;
}

/* HEARTS */
.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  transform: rotate(45deg);
  animation: float 5s linear infinite;
}

.heart::before,
.heart::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
}

@keyframes float {
  0% { transform: translateY(0) rotate(45deg); opacity: 1; }
  100% { transform: translateY(-800px) rotate(45deg); opacity: 0; }
}

/* FIREWORKS */
.firework {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: white;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<audio id="music" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<h1>Prettiest of all time ❤️<br>Mimi, will you accept this?</h1>

<img src="1.png" alt="Mimi">

<br>
<button id="yesBtn">Yes 💖</button>
<button id="noBtn">No 💔</button>

<div id="message">
  Mimi 💕<br>
  You are the most beautiful soul I have ever seen ✨<br>
  Your smile makes my world brighter 🌸<br>
  I am truly lucky to have you in my life 💖
</div>

<div id="extraText">
  Yes you are prettiest of all time 💖
</div>

<!-- VIDEO -->
<div id="videoContainer">
  <video id="myVideo" autoplay>
    <source src="pehli-nazar-mein.mp4" type="video/mp4">
  </video>
</div>

<script>
const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');
const message = document.getElementById('message');
const extraText = document.getElementById('extraText');
const videoContainer = document.getElementById('videoContainer');
const video = document.getElementById('myVideo');
const music = document.getElementById('music');

noBtn.addEventListener('mouseover', () => {
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;
  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';
});

noBtn.addEventListener('click', () => {
  alert("No is not an option 😄 Try again!");
});

yesBtn.addEventListener('click', () => {
  message.style.display = 'block';
  extraText.style.display = 'block';

  createHearts();
  createFireworks();

  music.pause();

  // delay before video (romantic pause 😏)
  setTimeout(() => {
    videoContainer.style.display = 'flex';

    setTimeout(() => {
      videoContainer.style.opacity = '1';
    }, 100);

    video.play();

    document.querySelector('h1').style.opacity = '0';
    document.querySelector('img').style.opacity = '0';
    yesBtn.style.opacity = '0';
    noBtn.style.opacity = '0';

  }, 2000);
});

function createHearts() {
  setInterval(() => {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.background = randomColor();
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

function createFireworks() {
  setInterval(() => {
    for (let i = 0; i < 20; i++) {
      const fw = document.createElement('div');
      fw.classList.add('firework');
      fw.style.left = Math.random() * window.innerWidth + 'px';
      fw.style.top = Math.random() * window.innerHeight + 'px';

      const angle = Math.random() * 2 * Math.PI;
      const distance = Math.random() * 100 + 50;
      fw.style.setProperty('--x', Math.cos(angle) * distance + 'px');
      fw.style.setProperty('--y', Math.sin(angle) * distance + 'px');

      fw.style.background = randomColor();
      document.body.appendChild(fw);
      setTimeout(() => fw.remove(), 1000);
    }
  }, 800);
}

function randomColor() {
  const colors = ['#ff4d6d', '#ff85a2', '#ff99c8', '#ffc2d1', '#ffb3c6', '#ff6f91'];
  return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
